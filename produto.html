<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe do Produto | Arena Burger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0b;
      --card: #171717;
      --line: #2f2f2f;
      --text: #f3f3f3;
      --orange: #ff6a00;
      --orange-strong: #ff4a00;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Barlow", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 90% -10%, rgba(255, 106, 0, 0.25), transparent 55%),
        var(--bg);
      padding: 1rem;
      display: grid;
      place-items: center;
    }

    .detail-card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    .hero {
      width: 100%;
      height: min(78vh, 760px);
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--line);
      background: #111;
    }

    .content {
      padding: 1.1rem;
      display: grid;
      gap: 0.85rem;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.04em;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--orange);
      line-height: 0.95;
    }

    p {
      color: #ededed;
      line-height: 1.65;
      font-size: 1.02rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      font-weight: 800;
      border-radius: 9px;
      padding: 0.65rem 0.9rem;
      display: inline-block;
    }

    .btn-order {
      color: #141414;
      background: linear-gradient(135deg, var(--orange), var(--orange-strong));
    }

    .btn-back {
      color: #f0f0f0;
      border: 1px solid #444;
      background: transparent;
    }

    @media (max-width: 768px) {
      .hero {
        height: min(50vh, 420px);
      }
    }
  </style>
</head>
<body>
  <main class="detail-card">
    <img id="produtoImagem" class="hero" alt="Imagem do produto" />
    <section class="content">
      <h1 id="produtoNome">Produto</h1>
      <p id="produtoDescricao">Descrição do produto.</p>
      <div class="actions">
        <a class="btn btn-order" href="https://api.whatsapp.com/send?phone=5547996950402" target="_blank" rel="noopener noreferrer">Pedir no WhatsApp</a>
        <a class="btn btn-back" href="./index2.html">Voltar ao cardápio</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      function toHighQualityImageUrl(url) {
        try {
          const u = new URL(url, window.location.href);
          const host = u.hostname.toLowerCase();

          if (host.includes("images.unsplash.com")) {
            u.searchParams.set("auto", "format");
            u.searchParams.set("fit", "crop");
            u.searchParams.set("w", "2600");
            u.searchParams.set("q", "95");
            u.searchParams.set("dpr", "2");
            return u.toString();
          }

          u.searchParams.set("w", "2400");
          u.searchParams.set("quality", "100");
          return u.toString();
        } catch (e) {
          return url;
        }
      }

      const params = new URLSearchParams(window.location.search);
      const nome = params.get("nome") || "Produto";
      const descricao = params.get("descricao") || "Descrição indisponível.";
      const imagem = params.get("imagem") || "https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=1200&q=80";

      document.getElementById("produtoNome").textContent = nome;
      document.getElementById("produtoDescricao").textContent = descricao;
      document.getElementById("produtoImagem").src = toHighQualityImageUrl(imagem);
      document.getElementById("produtoImagem").alt = nome;
      document.title = nome + " | Arena Burger";
    })();
  </script>
</body>
</html>
